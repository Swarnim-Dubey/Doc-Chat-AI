<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doc Chat AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <header>
      <h1>Doc Chat AI</h1>
      <button id="themeToggle" class="theme-btn">🌙</button>
    </header>

    <main>

      <!-- Upload Section -->
      <div class="upload-section">
        <input type="file" id="fileInput" />
        <button id="uploadBtn">Upload Document</button>
      </div>

      <!-- Chat Area -->
      <div class="chat-box" id="chatBox">
        <div class="message bot">Upload a document to start getting insights.</div>
      </div>

      <!-- Input -->
      <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask something about your document..." />
        <button id="sendBtn">Ask</button>
      </div>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>

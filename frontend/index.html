<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DocChat AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<header>
  <h1>DocChat AI</h1>
  <div>
    <button id="themeToggle">🌙</button>
    <button id="uploadBtn">📂</button>
  </div>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <button onclick="fileInput.click()">+ Upload File</button>

    <div id="fileList" class="file-list"></div>

    <input type="file" id="fileInput" hidden />
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <div class="content">

      <!-- VIEWER -->
      <div id="viewer" class="panel viewer">
        <p class="placeholder">Upload a document to preview</p>
      </div>

      <!-- RESIZER -->
      <div id="resizer"></div>

      <!-- CHAT -->
      <div class="chat-section">
        <div id="chatBox"></div>

        <div class="input-area">
          <input id="userInput" placeholder="Ask something..." />
          <button id="sendBtn">Send</button>
        </div>
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>

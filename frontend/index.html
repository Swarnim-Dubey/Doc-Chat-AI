<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DocChat AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Doc Chat</h1>

  <div class="header-actions">
    <select id="mode">
      <option value="strict">Strict</option>
      <option value="creative">Creative</option>
    </select>

    <button id="themeToggle">🌙</button>
    <button onclick="fileInput.click()">📂</button>
  </div>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <button onclick="fileInput.click()">+ Upload File</button>
    <div id="fileList"></div>
    <input type="file" id="fileInput" hidden />
  </aside>

  <!-- CHAT -->
  <main class="chat-section">

    <div id="chatBox"></div>

    <div id="loader" class="loader hidden"></div>

    <div class="input-area">
      <input id="userInput" placeholder="Ask something..." />
      <button id="sendBtn">Send</button>
    </div>

  </main>

  <!-- VIEWER -->
  <aside class="viewer" id="viewer">
    <p class="placeholder">Upload a document to preview</p>
  </aside>

</div>

<script src="script.js"></script>
</body>
</html>

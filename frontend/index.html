<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DocChat AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Doc Chat</h1>
  <div>
    <button id="themeToggle">🌙</button>
    <button onclick="fileInput.click()">📂</button>
  </div>
</header>

<div class="container">

  <aside class="sidebar">
    <button onclick="fileInput.click()">+ Upload File</button>
    <div id="fileList" class="file-list"></div>
    <input type="file" id="fileInput" hidden />
  </aside>

  <main class="chat-section">
    <div id="chatBox"></div>

    <div class="input-area">
      <input id="userInput" placeholder="Ask something..." />
      <button id="sendBtn">Send</button>
    </div>
  </main>

  <aside class="viewer" id="viewer">
    <p class="placeholder">Upload a document to preview</p>
  </aside>

</div>

<script src="script.js"></script>
</body>
</html>
